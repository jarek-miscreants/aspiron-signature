<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Aspiron Signature Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:wght@400;600;700&family=Zalando+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#f5f2ec; --ink:#111; --accent:#b8873b; --muted:#666; --line:#e4ddcf; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family: "Zalando Sans", system-ui, sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }
  h1 { font-family:"Zalando Sans Expanded", sans-serif; font-weight:700; margin:0 0 4px; font-size:28px; letter-spacing:-0.01em; }
  p.lead { color:var(--muted); margin:0 0 28px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:28px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  fieldset { border:1px solid var(--line); border-radius:10px; padding:16px 18px 18px; margin:0 0 18px; background:#fff; }
  legend { padding:0 8px; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input[type=text], input[type=url], input[type=email], input[type=tel] {
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:14px; background:#fff; color:var(--ink);
  }
  input:focus { outline:2px solid var(--accent); outline-offset:-1px; border-color:transparent; }
  .preview { border:1px solid var(--line); border-radius:10px; background:#fff; padding:16px; }
  canvas { display:block; width:600px; max-width:100%; height:auto; border:1px solid var(--line); border-radius:4px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:14px; }
  button { font-family:inherit; font-size:14px; padding:9px 16px; border-radius:7px; border:1px solid var(--ink); background:var(--ink); color:#fff; cursor:pointer; }
  button.secondary { background:#fff; color:var(--ink); }
  button:hover { opacity:.9; }
  textarea { width:100%; min-height:240px; font-family: "IBM Plex Mono", ui-monospace, monospace; font-size:12px; border:1px solid var(--line); border-radius:7px; padding:12px; background:#fff; color:var(--ink); }
  .hint { font-size:12px; color:var(--muted); margin-top:8px; }
  .status { font-size:12px; color:var(--accent); margin-left:6px; }
  details { margin-top:14px; }
  summary { cursor:pointer; font-size:13px; color:var(--muted); }
  .dept-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Aspiron Signature Generator</h1>
  <p class="lead">Bakes custom fonts into a PNG so email clients can’t strip them. Fill the fields → download the PNG → host it → copy the HTML.</p>

  <div class="grid">
    <div>
      <fieldset>
        <legend>Identity</legend>
        <label>Name</label>
        <input type="text" id="f-name" value="Jane Doe" />
        <label>Position</label>
        <input type="text" id="f-position" value="Senior Partner" />
        <label>Phone</label>
        <input type="tel" id="f-phone" value="+1 555 123 4567" />
        <label>Email</label>
        <input type="email" id="f-email" value="jane@aspironsearch.com" />
      </fieldset>

      <fieldset>
        <legend>Links</legend>
        <label>LinkedIn URL</label>
        <input type="url" id="f-linkedin" value="https://linkedin.com/company/aspiron" />
        <label>YouTube URL</label>
        <input type="url" id="f-youtube" value="https://youtube.com/@aspiron" />
        <label>Website URL</label>
        <input type="url" id="f-website" value="https://aspironsearch.com" />
        <label>Search pill URL</label>
        <input type="url" id="f-search" value="https://aspironsearch.com/search" />
        <label>Influence pill URL</label>
        <input type="url" id="f-influence" value="https://aspironsearch.com/influence" />
        <label>Ventures pill URL</label>
        <input type="url" id="f-ventures" value="https://aspironsearch.com/ventures" />
      </fieldset>

      <fieldset>
        <legend>Department</legend>
        <label>Select department (changes background)</label>
        <div class="row" style="margin-top:6px; gap:6px;">
          <button type="button" class="dept-btn secondary" data-dept="group">Group</button>
          <button type="button" class="dept-btn secondary" data-dept="search">Search</button>
          <button type="button" class="dept-btn secondary" data-dept="influence">Influence</button>
          <button type="button" class="dept-btn secondary" data-dept="ventures">Ventures</button>
        </div>
      </fieldset>

      <input type="hidden" id="f-imgurl" />
      <span class="status" id="upload-status"></span>
    </div>

    <div>
      <div class="preview">
        <div class="hint" style="margin-bottom:6px;">Signature preview</div>
        <div id="live-preview" style="border:1px solid var(--line); border-radius:4px; overflow:auto; background:#fff;"></div>
        <canvas id="cv" width="1200" height="300" style="position:absolute; left:-9999px; top:-9999px; width:600px; height:150px;"></canvas>
        <div class="row">
          <button id="btn-copy-rich">Copy for Gmail</button>
          <button id="btn-copy-outlook">Copy for Outlook</button>
          <button id="btn-download" class="secondary">Download PNG</button>
          <button id="btn-download-html" class="secondary">Download HTML</button>
          <span class="status" id="status"></span>
        </div>
        <div class="hint" id="font-status" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const DEPT_BACKGROUNDS = {
  group: "Aspiron-Email Signature-GROUP BG.png",
  search: "Aspiron Search-Email Signature-SEARCH BG.png",
  influence: "Aspiron Influence-Email Signature-INFLUENCE BG.png",
  ventures: "Aspiron Ventures-Email Signature-VENTURES BG.png",
};
const DEPT_COLORS = {
  group: "#FFCB76",
  search: "#D8923E",
  influence: "#FFA57E",
  ventures: "#EECAB0",
};
let currentDept = "group";
const PT_TO_PX = 4/3;
const R2_PUBLIC_BASE = "https://pub-376c070665f24d80ac2828a67b43160a.r2.dev";

const els = {
  name: document.getElementById("f-name"),
  position: document.getElementById("f-position"),
  phone: document.getElementById("f-phone"),
  email: document.getElementById("f-email"),
  linkedin: document.getElementById("f-linkedin"),
  youtube: document.getElementById("f-youtube"),
  website: document.getElementById("f-website"),
  search: document.getElementById("f-search"),
  influence: document.getElementById("f-influence"),
  ventures: document.getElementById("f-ventures"),
  imgurl: document.getElementById("f-imgurl"),
  cv: document.getElementById("cv"),
  status: document.getElementById("status"),
  fontStatus: document.getElementById("font-status"),
};

const DPR = 2;
const ctx = els.cv.getContext("2d");
ctx.scale(DPR, DPR);
let bgImage = null;
let fontsReady = false;

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

async function ensureFonts() {
  await document.fonts.ready;
  const needed = [
    '600 24pt "Zalando Sans Expanded"',
    '400 18pt "Zalando Sans"',
    '400 11px "IBM Plex Mono"',
  ];
  for (const f of needed) {
    try { await document.fonts.load(f); } catch(e) {}
  }
  fontsReady = true;
  els.fontStatus.textContent = "Fonts loaded: " + [...document.fonts].map(f => f.family + " " + f.weight).join(" · ");
}

function draw() {
  if (!bgImage) return;
  ctx.clearRect(0, 0, 1200, 300);
  ctx.drawImage(bgImage, 0, 0, 600, 150);
  ctx.fillStyle = "#000000";
  ctx.textBaseline = "top";

  // Name — Zalando Sans Expanded 24pt semi-bold at (30, 30)
  ctx.font = `600 ${24 * PT_TO_PX}px "Zalando Sans Expanded", sans-serif`;
  ctx.fillText(els.name.value, 30, 30);

  // Position — Zalando Sans Regular 18pt at (30, 60)
  ctx.font = `400 ${18 * PT_TO_PX}px "Zalando Sans", sans-serif`;
  ctx.fillText(els.position.value, 30, 60);

  // Phone — IBM Plex Mono at (30, 106), "Phone:" bold, value regular
  const phoneLabel = "Phone: ";
  ctx.font = `600 11px "IBM Plex Mono", monospace`;
  ctx.fillText(phoneLabel, 30, 106);
  const phoneLabelW = ctx.measureText(phoneLabel).width;
  ctx.font = `400 11px "IBM Plex Mono", monospace`;
  ctx.fillText(els.phone.value, 30 + phoneLabelW, 106);

  // Email — IBM Plex Mono at (30, 120), "Email:" bold, value regular
  const emailLabel = "Email: ";
  ctx.font = `600 11px "IBM Plex Mono", monospace`;
  ctx.fillText(emailLabel, 30, 120);
  const emailLabelW = ctx.measureText(emailLabel).width;
  ctx.font = `400 11px "IBM Plex Mono", monospace`;
  ctx.fillText(els.email.value, 30 + emailLabelW, 120);
}

function slugify(s) {
  return (s || "signature").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

function downloadPng() {
  els.cv.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `aspiron-${slugify(els.name.value)}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, "image/png");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

function buildHtml(imgUrl) {
  const v = {
    linkedin: escapeAttr(els.linkedin.value),
    youtube: escapeAttr(els.youtube.value),
    website: escapeAttr(els.website.value),
    search: escapeAttr(els.search.value),
    influence: escapeAttr(els.influence.value),
    ventures: escapeAttr(els.ventures.value),
    img: escapeAttr(imgUrl),
    iconBg: DEPT_COLORS[currentDept],
  };
  return `<!-- Aspiron Email Signature -->
<table cellpadding="0" cellspacing="0" border="0" width="600" style="width:600px; border-collapse:collapse; font-family:Arial, Helvetica, sans-serif;">
  <tr>
    <td background="${v.img}" width="600" height="150" valign="top" style="background-image:url('${v.img}'); background-size:cover; background-repeat:no-repeat; background-position:center; height:150px;">
      <!--[if gte mso 9]>
      <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px;height:150px;">
      <v:fill type="frame" src="${v.img}" />
      <v:textbox inset="0,0,0,0">
      <![endif]-->

      <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
        <tr>
          <td width="330" style="font-size:1px; line-height:1px;">&nbsp;</td>
          <td width="250" valign="top" style="padding:28px 24px 0 0;">

            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
              <tr><td style="height:44px; line-height:44px; font-size:1px;">&nbsp;</td></tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">
              <tr>
                <td style="padding-right:6px;">
                  <a href="${v.linkedin}" target="_blank" style="display:inline-block; width:28px; height:28px; background-color:${v.iconBg}; border-radius:6px; text-align:center; line-height:28px; text-decoration:none; font-size:13px; font-weight:700; color:#000000;">in</a>
                </td>
                <td style="padding-right:6px;">
                  <a href="${v.youtube}" target="_blank" style="display:inline-block; width:28px; height:28px; background-color:${v.iconBg}; border-radius:6px; text-align:center; line-height:28px; text-decoration:none; font-size:12px; color:#000000;">&#9654;</a>
                </td>
                <td>
                  <a href="${v.website}" target="_blank" style="display:inline-block; width:28px; height:28px; background-color:${v.iconBg}; border-radius:6px; text-align:center; line-height:28px; text-decoration:none; font-size:13px; color:#000000;">&#8853;</a>
                </td>
              </tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
              <tr><td style="height:10px; line-height:10px; font-size:1px;">&nbsp;</td></tr>
            </table>

            <table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">
              <tr>
                <td style="padding-right:8px;">
                  <a href="${v.search}" target="_blank" style="display:inline-block; background-color:#D8923E; color:#000000; font-size:9px; font-weight:600; font-family:Arial,Helvetica,sans-serif; text-decoration:none; padding:5px 16px; border-radius:9px; line-height:1; letter-spacing:0.8px;">SEARCH</a>
                </td>
                <td style="padding-right:8px;">
                  <a href="${v.influence}" target="_blank" style="display:inline-block; background-color:#FFA57E; color:#000000; font-size:9px; font-weight:600; font-family:Arial,Helvetica,sans-serif; text-decoration:none; padding:5px 16px; border-radius:9px; line-height:1; letter-spacing:0.8px;">INFLUENCE</a>
                </td>
                <td>
                  <a href="${v.ventures}" target="_blank" style="display:inline-block; background-color:#EECAB0; color:#000000; font-size:9px; font-weight:600; font-family:Arial,Helvetica,sans-serif; text-decoration:none; padding:5px 16px; border-radius:9px; line-height:1; letter-spacing:0.8px;">VENTURES</a>
                </td>
              </tr>
            </table>

          </td>
        </tr>
      </table>

      <!--[if gte mso 9]>
      </v:textbox>
      </v:rect>
      <![endif]-->
    </td>
  </tr>
</table>`;
}

function currentHtml() {
  const url = els.imgurl.value.trim() || els.cv.toDataURL("image/png");
  return buildHtml(url);
}

function updateLivePreview() {
  if (!bgImage) return;
  const dataUrl = els.cv.toDataURL("image/png");
  document.getElementById("live-preview").innerHTML = buildHtml(dataUrl);
}

function downloadHtml() {
  const blob = new Blob([currentHtml()], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `aspiron-signature-${slugify(els.name.value)}.html`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById("btn-download").addEventListener("click", downloadPng);
document.getElementById("btn-download-html").addEventListener("click", downloadHtml);

let uploadTimer = null;
function scheduleUpload() {
  clearTimeout(uploadTimer);
  uploadTimer = setTimeout(autoUpload, 800);
}

async function autoUpload() {
  const statusEl = document.getElementById("upload-status");
  statusEl.textContent = "Uploading…";
  try {
    const blob = await new Promise(res => els.cv.toBlob(res, "image/png"));
    const res = await fetch("/api/upload", {
      method: "POST",
      headers: {
        "Content-Type": "image/png",
        "X-Slug": slugify(els.name.value),
      },
      body: blob,
    });
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    }
    const { url } = await res.json();
    els.imgurl.value = url;
    statusEl.textContent = "Uploaded ✓";
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
  } finally {
    setTimeout(() => statusEl.textContent = "", 4000);
  }
}

document.querySelectorAll(".dept-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    currentDept = btn.dataset.dept;
    document.querySelectorAll(".dept-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    try {
      bgImage = await loadImage(DEPT_BACKGROUNDS[currentDept]);
      draw();
      updateLivePreview();
      scheduleUpload();
    } catch (e) {
      els.fontStatus.textContent = "Failed to load background for " + currentDept;
    }
  });
});
async function copyRichSignature() {
  const imgUrl = els.imgurl.value.trim();
  if (!imgUrl) {
    els.status.textContent = "Upload PNG first — Gmail blocks base64";
    setTimeout(() => els.status.textContent = "", 4000);
    return;
  }
  const html = buildHtml(imgUrl);
  const text = `${els.name.value} — ${els.position.value}\n${els.phone.value}\n${els.email.value}`;
  // Keep the live preview in sync with what we're copying
  document.getElementById("live-preview").innerHTML = html;
  try {
    // Write the raw HTML string (preserves Outlook's <!--[if mso]--> VML comments
    // which Chromium's selection-based copy would otherwise strip)
    await navigator.clipboard.write([
      new ClipboardItem({
        "text/html": new Blob([html], { type: "text/html" }),
        "text/plain": new Blob([text], { type: "text/plain" }),
      }),
    ]);
    els.status.textContent = "Copied — paste into Gmail or Outlook";
    setTimeout(() => els.status.textContent = "", 4000);
  } catch (e) {
    // Fallback for older browsers / non-secure contexts
    try {
      const preview = document.getElementById("live-preview");
      const range = document.createRange();
      range.selectNodeContents(preview);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      const ok = document.execCommand("copy");
      sel.removeAllRanges();
      if (!ok) throw new Error("execCommand copy failed");
      els.status.textContent = "Copied (fallback) — Outlook background may not render";
      setTimeout(() => els.status.textContent = "", 5000);
    } catch (e2) {
      els.status.textContent = "Copy failed: select the preview manually and Ctrl+C";
      setTimeout(() => els.status.textContent = "", 5000);
    }
  }
}
document.getElementById("btn-copy-rich").addEventListener("click", copyRichSignature);

// -- Outlook path: flat PNG (bg + text + icons + pills) + image map ------------
const CONTENT_RIGHT = 556;
const ICON_Y = 72;
const ICON_SIZE = 28;
const ICON_GAP = 6;
const ICON_RADIUS = 6;
const PILL_Y = 110;
const PILL_PAD_X = 16;
const PILL_PAD_Y = 5;
const PILL_RADIUS = 9;
const PILL_FONT_SIZE = 9;
const PILL_GAP = 8;

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

async function renderFullBaked() {
  const canvas = document.createElement("canvas");
  canvas.width = 1200;
  canvas.height = 300;
  const c = canvas.getContext("2d");
  c.scale(DPR, DPR);

  // Background + baked text (mirrors draw())
  c.drawImage(bgImage, 0, 0, 600, 150);
  c.fillStyle = "#000000";
  c.textBaseline = "top";
  c.textAlign = "left";
  c.font = `600 ${24 * PT_TO_PX}px "Zalando Sans Expanded", sans-serif`;
  c.fillText(els.name.value, 30, 30);
  c.font = `400 ${18 * PT_TO_PX}px "Zalando Sans", sans-serif`;
  c.fillText(els.position.value, 30, 60);
  const phoneLabel = "Phone: ";
  c.font = `600 11px "IBM Plex Mono", monospace`;
  c.fillText(phoneLabel, 30, 106);
  const phoneLabelW = c.measureText(phoneLabel).width;
  c.font = `400 11px "IBM Plex Mono", monospace`;
  c.fillText(els.phone.value, 30 + phoneLabelW, 106);
  const emailLabel = "Email: ";
  c.font = `600 11px "IBM Plex Mono", monospace`;
  c.fillText(emailLabel, 30, 120);
  const emailLabelW = c.measureText(emailLabel).width;
  c.font = `400 11px "IBM Plex Mono", monospace`;
  c.fillText(els.email.value, 30 + emailLabelW, 120);

  // Social icons (right-to-left)
  const iconBg = DEPT_COLORS[currentDept];
  const icons = [
    { text: "in",       font: 'bold 13px Arial, Helvetica, sans-serif', href: els.linkedin.value },
    { text: "▶",   font: '12px Arial, Helvetica, sans-serif',      href: els.youtube.value  },
    { text: "⊕",   font: '13px Arial, Helvetica, sans-serif',      href: els.website.value  },
  ];
  const regions = [];
  let iconRight = CONTENT_RIGHT;
  for (let i = icons.length - 1; i >= 0; i--) {
    const x = iconRight - ICON_SIZE;
    const y = ICON_Y;
    c.fillStyle = iconBg;
    roundRect(c, x, y, ICON_SIZE, ICON_SIZE, ICON_RADIUS);
    c.fill();
    c.fillStyle = "#000000";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.font = icons[i].font;
    c.fillText(icons[i].text, x + ICON_SIZE / 2, y + ICON_SIZE / 2 + 1);
    regions.unshift({ href: icons[i].href, coords: [x, y, x + ICON_SIZE, y + ICON_SIZE] });
    iconRight = x - (i > 0 ? ICON_GAP : 0);
  }

  // Pills (right-to-left)
  const pills = [
    { bg: "#D8923E", text: "SEARCH",    href: els.search.value    },
    { bg: "#FFA57E", text: "INFLUENCE", href: els.influence.value },
    { bg: "#EECAB0", text: "VENTURES",  href: els.ventures.value  },
  ];
  c.font = `600 ${PILL_FONT_SIZE}px Arial, Helvetica, sans-serif`;
  try { c.letterSpacing = "0.8px"; } catch (e) {}
  const pillH = PILL_FONT_SIZE + PILL_PAD_Y * 2 + 4;
  const pillSizes = pills.map(p => ({
    ...p,
    w: Math.ceil(c.measureText(p.text).width + PILL_PAD_X * 2),
    h: pillH,
  }));
  let pillRight = CONTENT_RIGHT;
  for (let i = pillSizes.length - 1; i >= 0; i--) {
    const p = pillSizes[i];
    const x = pillRight - p.w;
    const y = PILL_Y;
    c.fillStyle = p.bg;
    roundRect(c, x, y, p.w, p.h, PILL_RADIUS);
    c.fill();
    c.fillStyle = "#000000";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.font = `600 ${PILL_FONT_SIZE}px Arial, Helvetica, sans-serif`;
    c.fillText(p.text, x + p.w / 2, y + p.h / 2 + 1);
    regions.push({ href: p.href, coords: [x, y, x + p.w, y + p.h] });
    pillRight = x - (i > 0 ? PILL_GAP : 0);
  }
  try { c.letterSpacing = "0px"; } catch (e) {}

  return { canvas, regions };
}

function buildHtmlImageMap(imgUrl, regions) {
  const mapName = "aspiron-sig";
  const areas = regions.map(r =>
    `<area shape="rect" coords="${r.coords.map(n => Math.round(n)).join(",")}" href="${escapeAttr(r.href)}" target="_blank" alt="" />`
  ).join("\n  ");
  return `<!-- Aspiron Email Signature (Outlook) -->
<img src="${escapeAttr(imgUrl)}" usemap="#${mapName}" width="600" height="150" alt="Aspiron Signature" border="0" style="display:block; border:0; outline:0; text-decoration:none;" />
<map name="${mapName}">
  ${areas}
</map>`;
}

async function uploadBlob(blob, slug) {
  const res = await fetch("/api/upload", {
    method: "POST",
    headers: { "Content-Type": "image/png", "X-Slug": slug },
    body: blob,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  const { url } = await res.json();
  return url;
}

async function copyForOutlook() {
  els.status.textContent = "Baking full PNG…";
  try {
    await ensureFonts();
    if (!bgImage) throw new Error("Background not loaded");
    const { canvas, regions } = await renderFullBaked();
    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    const url = await uploadBlob(blob, slugify(els.name.value) + "-outlook");
    const html = buildHtmlImageMap(url, regions);
    const text = `${els.name.value} — ${els.position.value}\n${els.phone.value}\n${els.email.value}`;
    await navigator.clipboard.write([
      new ClipboardItem({
        "text/html": new Blob([html], { type: "text/html" }),
        "text/plain": new Blob([text], { type: "text/plain" }),
      }),
    ]);
    els.status.textContent = "Copied — paste into Outlook";
    setTimeout(() => els.status.textContent = "", 4000);
  } catch (e) {
    els.status.textContent = "Outlook copy failed: " + e.message;
    setTimeout(() => els.status.textContent = "", 5000);
  }
}
document.getElementById("btn-copy-outlook").addEventListener("click", copyForOutlook);

const textInputs = [els.name, els.position, els.phone, els.email];
const linkInputs = [els.linkedin, els.youtube, els.website, els.search, els.influence, els.ventures];

textInputs.forEach(i => i.addEventListener("input", () => { draw(); updateLivePreview(); scheduleUpload(); }));
linkInputs.forEach(i => i.addEventListener("input", updateLivePreview));

(async () => {
  document.querySelector('.dept-btn[data-dept="group"]').classList.add("active");
  try {
    bgImage = await loadImage(DEPT_BACKGROUNDS[currentDept]);
  } catch (e) {
    els.fontStatus.textContent = "Failed to load bg image. Serve over HTTP (not file://).";
    return;
  }
  await ensureFonts();
  draw();
  updateLivePreview();
  setTimeout(() => { draw(); updateLivePreview(); scheduleUpload(); }, 250);
})();
</script>
